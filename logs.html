<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>سجل العمليات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/743/743007.png">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="text-center mb-3">
            <img src="https://cdn-icons-png.flaticon.com/512/743/743007.png" width="48" height="48" class="mb-2">
        </div>
        <h2 class="mb-4 text-center text-primary fw-bold">سجل العمليات</h2>
        <div class="alert alert-info text-center fw-bold">مرحباً {{ session['username'] }}! يمكنك متابعة جميع العمليات المنفذة في النظام.</div>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>المستخدم</th>
                    <th>العملية</th>
                    <th>الوقت</th>
                </tr>
            </thead>
            <tbody>
                {% if logs|length == 0 %}
                <tr>
                    <td colspan="3" class="text-center text-danger fw-bold">لا توجد عمليات مسجلة حالياً</td>
                </tr>
                {% else %}
                    {% for log in logs %}
                    <tr>
                        <td>{{ log[1] }}</td>
                        <td>{{ log[2] }}</td>
                        <td>{{ log[3] }}</td>
                    </tr>
                    {% endfor %}
                {% endif %}
            </tbody>
        </table>
        <a href="/dashboard" class="btn btn-secondary">رجوع للوحة التحكم</a>
    </div>
</body>
</html>
