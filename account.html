<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إعدادات الحساب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/743/743007.png">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="text-center mb-3">
            <img src="https://cdn-icons-png.flaticon.com/512/743/743007.png" width="48" height="48" class="mb-2">
        </div>
        <h2 class="mb-4 text-center text-primary fw-bold">إعدادات الحساب</h2>
        <div class="alert alert-info text-center fw-bold">مرحباً {{ username }}! يمكنك تغيير كلمة المرور الخاصة بك هنا.</div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" class="form-control" name="username" value="{{ username }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">تغيير كلمة المرور</label>
                <input type="password" class="form-control" name="new_password" placeholder="كلمة المرور الجديدة">
            </div>
            <button type="submit" class="btn btn-primary w-100">تحديث كلمة المرور</button>
        </form>
        <a href="/dashboard" class="btn btn-secondary mt-3">رجوع للوحة التحكم</a>
    </div>
</body>
</html>
