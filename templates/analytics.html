<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحليلات | Smart Parking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/743/743007.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/dashboard">
                <img src="https://cdn-icons-png.flaticon.com/512/743/743007.png" width="32" height="32" class="me-2">
                Smart Parking
            </a>
            <div class="d-flex">
                <a href="/dashboard" class="btn btn-outline-light me-2">لوحة التحكم</a>
                <a href="/logout" class="btn btn-outline-light">تسجيل الخروج</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-4 text-center text-primary fw-bold">التحليلات والإيرادات</h2>
        <div class="alert alert-info text-center fw-bold">مرحباً {{ session['username'] }}! يمكنك متابعة الإيرادات والتحليلات هنا.</div>
        <div class="card shadow p-4">
                        <div class="text-center mb-3">
                            <a href="/dashboard" class="btn btn-secondary">العودة إلى لوحة التحكم</a>
                        </div>
            <canvas id="revenueChart"></canvas>
        </div>
    </div>
    <script>
        const labels = {{ labels|tojson }};
        const values = {{ values|tojson }};
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'الإيرادات',
                    data: values,
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
