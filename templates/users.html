<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إدارة المستخدمين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-center text-primary fw-bold">إدارة المستخدمين</h2>
        <div class="alert alert-info text-center fw-bold">يمكنك إضافة أو حذف أو تعديل المستخدمين.</div>
        <form method="post" class="mb-4">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" name="username" class="form-control" placeholder="اسم المستخدم" required>
                </div>
                <div class="col-md-4">
                    <input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
                </div>
                <div class="col-md-2">
                    <select name="role" class="form-select">
                        <option value="operator">موظف</option>
                        <option value="admin">مشرف</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">إضافة مستخدم</button>
                </div>
            </div>
        </form>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>اسم المستخدم</th>
                    <th>الصلاحية</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[1] }}</td>
                    <td>{{ user[3] }}</td>
                    <td>
                        {% if user[3] != 'admin' %}
                        <form method="post" action="/users/delete/{{ user[0] }}">
                            <button type="submit" class="btn btn-danger btn-sm">حذف</button>
                        </form>
                        {% else %}
                        <span class="text-muted">لا يمكن حذف المشرف</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/dashboard" class="btn btn-secondary mt-3">رجوع للوحة التحكم</a>
    </div>
</body>
</html>
