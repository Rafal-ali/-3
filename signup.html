<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل حساب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <form method="post" class="card p-4 shadow">
        <h2 class="mb-3">تسجيل حساب</h2>
        <input type="text" name="username" class="form-control mb-2" placeholder="اسم المستخدم" required>
        <input type="password" name="password" class="form-control mb-2" placeholder="كلمة المرور" required>
        <button type="submit" class="btn btn-primary w-100">تسجيل</button>
        <div class="mt-2 text-center">
            <a href="{{ url_for('login') }}">لديك حساب؟ سجل الدخول</a>
        </div>
    </form>
</div>
</body>
</html>
